<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=580, initial-scale=1">
<title>Paper Workout Form &middot; A5</title>
<style>
  :root {
    --line: #222;
    --faint: #888;
    --ghost: #ccc;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: #f4f4f0;
    color: var(--line);
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 9pt;
    line-height: 1.2;
  }

  .sheet {
    width: 148mm;
    height: 210mm;
    margin: 12px auto;
    padding: 7mm 7mm 6mm;
    background: white;
    box-shadow: 0 1px 6px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
  }

  /* ---------- Top row (Date / Day / Start / End / Focus) ---------- */

  .top-row {
    display: grid;
    grid-template-columns: 18mm 22mm 14mm 14mm 1fr;
    height: 11mm;
    border-bottom: 1px solid var(--line);
  }
  .cell {
    border-right: 1px solid var(--line);
    padding: 1mm 1.5mm 1mm;
    display: flex;
    flex-direction: column;
    gap: 0.5mm;
  }
  .cell:last-child { border-right: none; }
  .cell label {
    font-size: 6.5pt;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--faint);
  }

  /* ---------- Pre / Post block ---------- */

  .po-block {
    border-bottom: 1px solid var(--line);
  }
  .po-row {
    height: 10mm;
    display: flex;
    align-items: center;
    padding: 0 1.5mm;
    position: relative;
  }
  .po-row label {
    font-size: 6.5pt;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--faint);
    width: 10mm;
  }
  .po-row::after {
    content: '';
    position: absolute;
    left: 13mm;
    right: 1.5mm;
    top: 50%;
    border-bottom: 0.5pt solid var(--line);
  }

  /* ---------- Plan / Extras blocks ---------- */

  .block {
    margin-top: 2mm;
    margin-bottom: 2mm;
  }
  .block .head {
    font-size: 6.5pt;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--faint);
    margin-bottom: 0.5mm;
  }
  .ruled {
    background-image: repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent 5mm,
      var(--ghost) 5mm,
      var(--ghost) calc(5mm + 0.3pt)
    );
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .ruled.h-plan   { height: 15mm; }  /* 3 rows */
  .ruled.h-extras { height: 25mm; }  /* 5 rows */

  /* ---------- Sets table ---------- */

  table.sets {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    margin-top: 1.5mm;
  }
  table.sets th,
  table.sets td {
    border: 1px solid var(--line);
    padding: 0;
    height: 6mm;
    vertical-align: top;
    text-align: left;
  }
  table.sets th {
    font-size: 6pt;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--faint);
    font-weight: normal;
    height: 4mm;
    padding: 0 1mm;
    background: #fafaf6;
  }
  table.sets td { padding: 0.5mm 1mm; }

  col.c-time { width: 10mm; }
  col.c-ex   { width: 26mm; }
  col.c-rw   { width: 22mm; }
  col.c-form { width: 10mm; }
  col.c-note { width: auto; }

  /* ---------- Print ---------- */

  @page {
    size: A5 portrait;
    margin: 0;
  }
  @media print {
    body { background: white; }
    .sheet {
      width: 148mm;
      height: 210mm;
      margin: 0;
      box-shadow: none;
      padding: 7mm 7mm 5mm;
    }
    .no-print { display: none !important; }
  }

  .print-btn {
    position: fixed;
    bottom: 16px;
    right: 16px;
    padding: 10px 16px;
    background: #222;
    color: white;
    border: none;
    border-radius: 999px;
    font: 14px "Helvetica Neue", Helvetica, Arial, sans-serif;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
</style>
</head>
<body>

<button class="print-btn no-print" onclick="window.print()">Print A5</button>

<div class="sheet">

  <div class="top-row">
    <div class="cell"><label>Date</label></div>
    <div class="cell"><label>Day</label></div>
    <div class="cell"><label>Start</label></div>
    <div class="cell"><label>End</label></div>
    <div class="cell"><label>Focus</label></div>
  </div>

  <div class="po-block">
    <div class="po-row"><label>Pre</label></div>
    <div class="po-row"><label>Post</label></div>
  </div>

  <div class="block">
    <div class="head">Plan</div>
    <div class="ruled h-plan"></div>
  </div>

  <table class="sets">
    <colgroup>
      <col class="c-time">
      <col class="c-ex">
      <col class="c-rw">
      <col class="c-form">
      <col class="c-note">
    </colgroup>
    <thead>
      <tr>
        <th>Time</th>
        <th>Exercise</th>
        <th>Reps @ Load &middot; Lat</th>
        <th>Form</th>
        <th>Notes</th>
      </tr>
    </thead>
    <tbody>
      <tr><td></td><td></td><td></td><td></td><td></td></tr>
      <tr><td></td><td></td><td></td><td></td><td></td></tr>
      <tr><td></td><td></td><td></td><td></td><td></td></tr>
      <tr><td></td><td></td><td></td><td></td><td></td></tr>
      <tr><td></td><td></td><td></td><td></td><td></td></tr>
      <tr><td></td><td></td><td></td><td></td><td></td></tr>
      <tr><td></td><td></td><td></td><td></td><td></td></tr>
      <tr><td></td><td></td><td></td><td></td><td></td></tr>
      <tr><td></td><td></td><td></td><td></td><td></td></tr>
      <tr><td></td><td></td><td></td><td></td><td></td></tr>
      <tr><td></td><td></td><td></td><td></td><td></td></tr>
      <tr><td></td><td></td><td></td><td></td><td></td></tr>
      <tr><td></td><td></td><td></td><td></td><td></td></tr>
      <tr><td></td><td></td><td></td><td></td><td></td></tr>
      <tr><td></td><td></td><td></td><td></td><td></td></tr>
    </tbody>
  </table>

  <div class="block">
    <div class="head">Extras</div>
    <div class="ruled h-extras"></div>
  </div>

</div>
</body>
</html>
