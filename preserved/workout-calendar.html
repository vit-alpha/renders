<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Workout Calendar</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #171a21;
    --line: #262b35;
    --ink: #e7e9ee;
    --muted: #8b93a3;
    --strength: #4f8cff;
    --sport: #34c77b;          /* freshness "fresh" cue (kept) */
    --cond: #ff9f43;           /* freshness "mid" cue (kept) */
    --yoga: #ffffff;           /* white (yoga + hot yoga) */
    --activity: #e3a9d4;       /* festival/walking — pink-lilac (related to calves) */
    --football: #9e3b4e;       /* sport — maroon */
    --conditioning: #9c6b43;   /* brown */
    --today: #ffd33d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 18px 14px 40px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  h1 { font-size: 20px; margin: 0 0 2px; letter-spacing: .2px; }
  .sub { color: var(--muted); font-size: 13px; margin: 0 0 16px; }

  .legend {
    display: flex; flex-direction: column; gap: 6px;
    margin: 0 0 18px; font-size: 12px; color: var(--muted);
  }
  .legend-row { display: flex; flex-wrap: wrap; gap: 8px 14px; }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; border: 1px solid rgba(255,255,255,.12); }
  .d-strength { background: var(--strength); }
  .d-sport { background: var(--football); }
  .d-yoga { background: var(--yoga); }
  .d-cond { background: var(--conditioning); }
  .d-activity { background: var(--activity); }

  .hint { font-size: 11px; color: var(--muted); margin: -8px 0 16px; }

  .grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 6px; align-items: stretch; }
  .wd {
    text-align: center; font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .5px; padding-bottom: 2px;
  }
  .mdiv {
    grid-column: 1 / -1;
    font-size: 11px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: .8px;
    padding: 9px 2px 3px; border-top: 1px solid var(--line);
  }
  .mdiv.first { border-top: none; padding-top: 2px; }
  .cell {
    background: var(--card); border: 1px solid var(--line); border-radius: 9px;
    min-height: 58px; padding: 5px 4px 6px;
    display: flex; flex-direction: column; gap: 3px;
  }
  .cell.has { cursor: pointer; transition: border-color .12s, transform .06s; }
  .cell.has:active { transform: scale(.97); }
  .cell.sel { border-color: var(--ink); box-shadow: 0 0 0 1px var(--ink) inset; }
  .num { font-size: 11px; color: var(--muted); font-weight: 600; line-height: 1; }
  .cell.today { border-color: var(--today); box-shadow: 0 0 0 1px var(--today) inset; }
  .cell.today .num { color: var(--today); }

  .chip {
    font-size: 10px; line-height: 1.2; padding: 2px 4px; border-radius: 5px;
    color: #0b0d11; font-weight: 600; white-space: normal; overflow-wrap: anywhere; hyphens: auto;
  }
  .c-sport { background: var(--football); color: #f5f7fa; }
  .c-yoga { background: var(--yoga); box-shadow: inset 0 0 0 1px #c3c8d2; }
  .c-cond { background: var(--conditioning); color: #f5f7fa; }
  .c-activity { background: var(--activity); }

  /* detail panel */
  #detail {
    position: sticky; bottom: 0;
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 16px 16px; margin-top: 18px;
    box-shadow: 0 -6px 24px rgba(0,0,0,.35);
  }
  #detail.hidden { display: none; }
  .d-head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
  .d-date { font-size: 15px; font-weight: 700; }
  .d-close { background: none; border: none; color: var(--muted); font-size: 20px; line-height: 1; cursor: pointer; padding: 0 4px; }
  .d-sess { margin-top: 12px; }
  .d-sess:first-of-type { margin-top: 8px; }
  .d-title { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 700; }
  .d-title .dot { width: 9px; height: 9px; }
  .d-meta { font-size: 11px; color: var(--muted); margin-left: 16px; margin-top: 1px; }
  .d-areas { margin: 7px 0 0 16px; display: flex; flex-wrap: wrap; gap: 5px; }
  .d-areas .chip { font-size: 10px; padding: 2px 7px; }
  .d-items { margin: 7px 0 0; padding-left: 18px; }
  .d-items li { font-size: 12.5px; line-height: 1.5; color: var(--ink); }

  .stats {
    display: flex; gap: 18px; flex-wrap: wrap;
    margin-top: 22px; padding-top: 14px; border-top: 1px solid var(--line);
  }
  .stat .n { font-size: 22px; font-weight: 700; }
  .stat .l { font-size: 11px; color: var(--muted); }

  .fresh { margin-top: 26px; }
  .fresh h2 { font-size: 15px; margin: 0 0 4px; font-weight: 600; }
  .fresh table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .fresh th {
    text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: .5px;
    color: var(--muted); font-weight: 600; padding: 0 8px 7px; border-bottom: 1px solid var(--line);
  }
  .fresh th.r, .fresh td.r { text-align: right; }
  .fresh td { padding: 7px 8px; border-bottom: 1px solid var(--line); }
  .fresh tr:last-child td { border-bottom: none; }
  .fresh .area { font-weight: 600; }
  .since { font-weight: 700; }
  .since-due { color: var(--today); }
  .since-fresh { color: var(--sport); }
  .since-mid { color: var(--cond); }
  .since-worked { color: #ff6b6b; }
  .fresh .last { color: var(--muted); }
  .fresh .due { font-size: 10px; font-weight: 700; color: var(--today); letter-spacing: .3px; }
  .bar { display: inline-block; height: 6px; border-radius: 3px; vertical-align: middle; background: var(--strength); opacity: .85; }
  .fresh .load { color: var(--muted); font-variant-numeric: tabular-nums; }
  .build-ts { margin-top: 20px; font-size: 9px; color: #4a505c; font-family: monospace; text-align: right; }

  @media (max-width: 520px) {
    .cell { min-height: 52px; border-radius: 7px; padding: 4px 3px 5px; }
    .chip { font-size: 9px; padding: 1px 4px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Workout Calendar</h1>
  <p class="sub" id="cal-sub">Recent training — newest first</p>

  <div class="legend" id="legend"></div>

  <div id="months"></div>

  <div id="detail" class="hidden">
    <div class="d-head">
      <span class="d-date" id="d-date"></span>
      <button class="d-close" id="d-close" aria-label="close">&times;</button>
    </div>
    <div id="d-body"></div>
  </div>

  <div class="stats">
    <div class="stat"><div class="n">14</div><div class="l">Strength sessions</div></div>
    <div class="stat"><div class="n">4</div><div class="l">Sport</div></div>
    <div class="stat"><div class="n">2</div><div class="l">Yoga</div></div>
    <div class="stat"><div class="n">1</div><div class="l">Conditioning</div></div>
  </div>

  <div class="fresh">
    <h2>Goal-area freshness</h2>
    <p class="hint">Current training-goal areas, freshest at top — including targets not trained recently (the freshest of all). As of 19 Jun.</p>
    <table id="fresh-table">
      <thead>
        <tr><th>Area</th><th class="r">Time since</th><th class="r">Last worked</th><th class="r">Recent load</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="build-ts" id="build-ts"></div>
</div>

<script>

0/15/15 @ BW+15kg LR D 15@BW (L only)", "Loaded EGT 2×20@10kg LR \\^", "Hammer curl 10@16 / 7+3c@16 D 10+5c@10 / 10+5c@8 D 8+4c@6 \\*\\* / 15+5c@6 \\*", "Cable bicep curl 8@15 / 12@15 \\* (new exercise)"], "areas": ["lowerpress", "hinge", "calves"]}], "2026-05-28": [{"cat": "sport", "label": "Outdoor football", "meta": "7:00PM · ~40 min", "items": ["Outdoor football"]}], "2026-05-27": [{"cat": "strength", "label": "Upper pull + correctives", "meta": "12:35 · ~1h02", "items": ["Mobilise (DFD, dead bugs, bird dogs, hip lean)", "Prone Y-raise 7@2 EQ D 7@BW (drop set)", "Pull-up 7@BW (6 athletic + 1 regular)", "Machine row 8@40 EQ EZ / 8@55 EQ \\^ / 10+2c@65 EQ \\*f / 10+2c@55 EQ \\*f ...4 myorep", "Hyperextension 30@BW", "Copenhagen plank 30s LR (limited by arm)", "Copenhagen bumps 10@BW LR (new variant)", "Copenhagen plank lower-leg 30s LR", "Single-arm lat pulldown L 8+3c@33"], "areas": ["upperpull", "traps", "hinge"]}], "2026-05-26": [{"cat": "strength", "label": "Upper push + lower hinge. Seated bench m", "meta": "17:36 · ~58 min", "items": ["Mobilise (DFD, dead bugs, bird dogs, prone Y-raise)", "Bench machine 5@50 EZ / 6@65 / 8F@70 \\^\\* / 7+1c@67.5", "EGT 25 LR @ BW \\^\\*", "Leg curl 10@57.5 \\^\\^ EZ / 14@70 +3 myorep \\^\\* / 20@65 \\* / 2×20 LR @ 30 \\*\\^", "Bench machine finisher 10@60 v / 12f@52.5 \\^"], "areas": ["upperpush", "hinge"]}], "2026-05-25": [{"cat": "yoga", "label": "Hotpod flow", "meta": "12:31PM · ~50 min", "items": ["Hotpod flow"]}], "2026-05-24": [{"cat": "activity", "label": "Day festival", "meta": "", "items": ["Day festival"]}], "2026-05-21": [{"cat": "sport", "label": "Outdoor football", "meta": "7:49PM · ~40 min", "items": ["Outdoor football"]}], "2026-05-20": [{"cat": "strength", "label": "Upper pull", "meta": "19:48 · ~1h27", "items": ["Mobilise (dead bugs, bird dogs, prone Y-raise)", "Skipping 100 reps \\^", "Hops L 50 \\^", "Prone Y-raise (2nd primer)", "Pull-up wide grip 9f\\^ + 7f + 5f @ BW+8kg", "Side planks 1:00 L + 45s R \\*", "Hammer curl 2×15@12 ALT", "BB curl 4f@35 \\*", "Hammer curl 15@10 EQ \\* + 10+10c@8 EQ \\*"], "areas": ["upperpull", "calves"]}], "2026-05-18": [{"cat": "strength", "label": "Lower hinge", "meta": "18:32 · ~1h39", "items": ["Mobilise (hip CARs, leg swings, dead bugs, bird dogs, cat-cow", "DFD)", "SL RDL + EGT superset — SL RDL 10@8 + 15@8 \\*\\^ + 25@8 \\*\\* LR / EGT 10@BW + 15@BW \\*\\^ LR", "Single-arm lat pulldown (L) 15@24.5 + 12@31.5 \\* + 17@28 \\* + 17@28 \\^", "Leg curl 5@50 EZ + 8@70 + 10@72.5 (PB) + 16@35 LR + 20@35 LR \\*", "Standing calf raise 3×17@BW+8 LR \\* + 2×(17+8c)@BW+8 LR \\*", "EGT finisher 20@10kg LR \\*\\^"], "areas": ["upperpull", "hinge", "calves"]}]};

// area palette + the areas each workout hit (derived from the activity-log Volume field)
// ordered to match the colour key; t = chip text colour: "d" dark, "l" light
const AREA = {
  upperpull:  { label:"Pull",      c:"#2dd4bf", t:"d" },  // turquoise
  traps:      { label:"Traps",     c:"#4caf6a", t:"d" },  // green
  upperpush:  { label:"Push",      c:"#4f8cff", t:"l" },  // blue
  shoulders:  { label:"Shoulders", c:"#b07bff", t:"d" },  // purple
  lowerpress: { label:"Press",     c:"#ef5350", t:"d" },  // red
  hinge:      { label:"Hinge",     c:"#ff9f43", t:"d" },  // orange (incl. hamstring work)
  calves:     { label:"Calves",    c:"#c9a9e6", t:"d" },  // lilac
  core:       { label:"Core",      c:"#9ae6c8", t:"d" }   // mint
};
const txt = t => t === "l" ? "#f5f7fa" : "#0b0d11";
function areaChipHTML(a){
  return `<span class="chip" style="background:${AREA[a].c};color:${txt(AREA[a].t)}">${AREA[a].label}</span>`;
}

const TODAY = "2026-06-19";
const NUM_WEEKS = 5;   // current week + last 4
const MON = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const MONTHFULL = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function pad(n){ return String(n).padStart(2,"0"); }
function keyOf(dt){ return `${dt.getUTCFullYear()}-${pad(dt.getUTCMonth()+1)}-${pad(dt.getUTCDate())}`; }

// Build NUM_WEEKS Mon–Sun weeks, newest week first, ending with the week containing TODAY.
function buildWeeks(){
  const [ty,tm,td] = TODAY.split("-").map(Number);
  const t = new Date(Date.UTC(ty, tm-1, td));
  const dow = (t.getUTCDay()+6)%7;               // Mon=0
  const monday = new Date(t); monday.setUTCDate(t.getUTCDate()-dow);
  const weeks = [];
  for(let w=0; w<NUM_WEEKS; w++){                 // w=0 → current week (top)
    const start = new Date(monday); start.setUTCDate(monday.getUTCDate()-7*w);
    const wk = [];
    for(let i=0;i<7;i++){
      const dt = new Date(start); dt.setUTCDate(start.getUTCDate()+i);
      wk.push(dt);
    }
    weeks.push(wk);
  }
  return weeks;
}

function shownSessions(key){ return S[key] || []; }

function render(){
  const host = document.getElementById("months");
  host.innerHTML = "";
  const weeks = buildWeeks();
  const grid = document.createElement("div");
  grid.className = "grid";
  ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].forEach(w=>{
    const e=document.createElement("div"); e.className="wd"; e.textContent=w; grid.appendChild(e);
  });
  let prevM = null;
  weeks.forEach(week=>{
    // full-width month divider whenever the (Monday's) month changes, newest→oldest
    const wkM = week[0].getUTCMonth();
    if(wkM !== prevM){
      const div = document.createElement("div");
      div.className = "mdiv" + (prevM === null ? " first" : "");
      div.textContent = `${MONTHFULL[wkM]} ${week[0].getUTCFullYear()}`;
      grid.appendChild(div);
      prevM = wkM;
    }
    week.forEach(dt=>{
      const key = keyOf(dt);
      const cell = document.createElement("div");
      cell.className = "cell";
      if(key===TODAY) cell.classList.add("today");
      let html = `<span class="num">${dt.getUTCDate()}</span>`;
      const sess = shownSessions(key);
      if(sess.length){
        cell.classList.add("has");
        cell.dataset.key = key;
        sess.forEach(s=>{
          if(s.areas){
            // one chip per area the workout hit, each coloured by that area
            s.areas.forEach(a=> html += areaChipHTML(a));
          } else {
            html += `<span class="chip c-${s.cat}">${s.label}</span>`;
          }
        });
      }
      cell.innerHTML = html;
      grid.appendChild(cell);
    });
  });
  host.appendChild(grid);

  // subtitle: date range of the window
  const oldest = weeks[weeks.length-1][0];
  const newest = weeks[0][6];
  document.getElementById("cal-sub").textContent =
    `Last ${NUM_WEEKS} weeks · ${oldest.getUTCDate()} ${MON[oldest.getUTCMonth()]} – ${newest.getUTCDate()} ${MON[newest.getUTCMonth()]} · newest first`;

  equalizeHeights();
}

// make every day cell the same height (tallest content wins) — read all, then write all
function equalizeHeights(){
  const cells = document.querySelectorAll("#months .cell");
  cells.forEach(c=>{ c.style.minHeight = ""; });
  const max = Math.max(...Array.from(cells, c=> c.offsetHeight));
  cells.forEach(c=>{ c.style.minHeight = max + "px"; });
}
window.addEventListener("resize", equalizeHeights);
render();

// detail panel
const detail = document.getElementById("detail");
const dDate = document.getElementById("d-date");
const dBody = document.getElementById("d-body");
let selCell = null;

function fmtDate(key){
  const [y,m,d] = key.split("-").map(Number);
  const dt = new Date(Date.UTC(y,m-1,d));
  const wd = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][dt.getUTCDay()];
  const mo = MON[m-1];
  return `${wd} ${d} ${mo}`;
}

function areaChips(s){
  if(!s.areas) return "";
  return `<div class="d-areas">${s.areas.map(areaChipHTML).join("")}</div>`;
}

function open(key, cell){
  if(selCell) selCell.classList.remove("sel");
  selCell = cell; cell.classList.add("sel");
  dDate.textContent = fmtDate(key);
  dBody.innerHTML = shownSessions(key).map(s=>`
    <div class="d-sess">
      <div class="d-title"><i class="dot d-${s.cat}"></i>${s.label} <span style="color:var(--muted);font-weight:500">· ${CAT[s.cat]}</span></div>
      <div class="d-meta">${s.meta}</div>
      ${areaChips(s)}
      <ul class="d-items">${s.items.map(i=>`<li>${i}</li>`).join("")}</ul>
    </div>`).join("");
  detail.classList.remove("hidden");
}

function closeDetail(){
  detail.classList.add("hidden");
  if(selCell){ selCell.classList.remove("sel"); selCell=null; }
}

// delegated click — survives re-render on mode toggle
document.getElementById("months").addEventListener("click", e=>{
  const cell = e.target.closest(".cell.has");
  if(cell) open(cell.dataset.key, cell);
});
document.getElementById("d-close").addEventListener("click", closeDetail);

// colour key — explicit rows: uppers / press+hinge+sport / calves+walking / conditioning+yoga
// area swatches sourced from AREA (label+colour single-sourced); non-workout types from TYPE_COL
const TYPE_COL = { sport:"#9e3b4e", conditioning:"#9c6b43", activity:"#e3a9d4", yoga:"#ffffff" };
const A = k => [AREA[k].label, AREA[k].c];
const KEY_ROWS = [
  [A("upperpull"),A("traps"),A("upperpush"),A("shoulders"),A("core")],
  [A("lowerpress"),A("hinge"),["Sport",TYPE_COL.sport]],
  [A("calves"),["Festival / walking",TYPE_COL.activity]],
  [["Conditioning",TYPE_COL.conditioning],["Yoga",TYPE_COL.yoga]]
];
document.getElementById("legend").innerHTML = KEY_ROWS.map(row=>
  `<div class="legend-row">` + row.map(([label,c])=>
    `<span><i class="dot" style="background:${c}"></i> ${label}</span>`
  ).join("") + `</div>`
).join("");

// --- Goal-area freshness (vit freshness, 120-day window, half-life 3d, as-of 2026-06-19) ---
// current training-goal areas, including ones not trained recently (untrained = freshest)
// over:true → not trained inside the window, so "days" is a floor and date is unknown
const FRESH = [{"area": "Vertical Push (OH / landmine)", "days": 120, "last": "—", "load": 0, "over": true}, {"area": "Rotation (bar step press)", "days": 63, "last": "2026-04-17", "load": 0.0, "over": false}, {"area": "Core (anti-rotation)", "days": 19, "last": "2026-05-31", "load": 0.0, "over": false}, {"area": "Squat", "days": 17, "last": "2026-06-02", "load": 0.002, "over": false}, {"area": "Hinge", "days": 9, "last": "2026-06-10", "load": 0.017, "over": false}, {"area": "Quad (iso)", "days": 9, "last": "2026-06-10", "load": 0.018, "over": false}, {"area": "Hamstring (iso)", "days": 7, "last": "2026-06-12", "load": 0.039, "over": false}, {"area": "Horizontal Push", "days": 5, "last": "2026-06-14", "load": 0.154, "over": false}, {"area": "Triceps (iso)", "days": 5, "last": "2026-06-14", "load": 0.056, "over": false}, {"area": "Plyometric", "days": 3, "last": "2026-06-16", "load": 0.026, "over": false}, {"area": "Biceps (iso)", "days": 3, "last": "2026-06-16", "load": 0.071, "over": false}, {"area": "Horizontal Pull", "days": 3, "last": "2026-06-16", "load": 0.138, "over": false}, {"area": "Vertical Pull", "days": 3, "last": "2026-06-16", "load": 0.197, "over": false}, {"area": "Shoulder (iso)", "days": 3, "last": "2026-06-16", "load": 0.206, "over": false}, {"area": "Calf (iso)", "days": 3, "last": "2026-06-16", "load": 0.263, "over": false}];
const maxLoad = Math.max(...FRESH.map(f=>f.load));
function sinceClass(d){ return d>=22 ? "since-due" : d>=7 ? "since-fresh" : d>=4 ? "since-mid" : "since-worked"; }
function fmtLast(s){
  if(!/^\d{4}-/.test(s)) return s;
  const [y,m,d]=s.split("-").map(Number);
  return `${d} ${MON[m-1]}`;
}
const ftbody = document.querySelector("#fresh-table tbody");
FRESH.forEach(f=>{
  const tr=document.createElement("tr");
  const w = maxLoad ? Math.max(f.load>0?3:0, Math.round(f.load/maxLoad*60)) : 0;
  tr.innerHTML =
    `<td class="area">${f.area}${f.over?' <span class="due">· due</span>':''}</td>`+
    `<td class="r since ${sinceClass(f.days)}">${f.days}${f.over?'+':''}d</td>`+
    `<td class="r last">${fmtLast(f.last)}</td>`+
    `<td class="r load"><span class="bar" style="width:${w}px"></span> ${f.load.toFixed(3)}</td>`;
  ftbody.appendChild(tr);
});

document.getElementById("build-ts").textContent = "built 2026-06-19 · auto";
</script>
</body>
</html>
